<title>Chaplin Bar – Menu</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
    --base:          #CEB898;
    --base-light:    #EAD9C0;
    --base-lighter:  #F2E8D8;
    --base-dark:     #8A6A42;
    --base-darker:   #6B5030;
    --ink:           #1C1410;
    --ink-soft:      #2E2018;
    --text-mid:      #4A3828;
}

body {
    font-family: "DM Sans", sans-serif;
    background: #f4dab4;
    color: var(--ink);
    min-height: 100vh;
}

html { scroll-behavior: smooth; }

/* ── NAVBAR ─────────────────────────────────────────────── */
.navbar {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    background: #f4dab4;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    z-index: 1000;
    box-shadow: 0 4px 20px rgb(100 63 19 / 20%);
}

.nav-top {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 12px 24px 10px 24px;
}

.nav-title {
    font-family: "Cormorant Garamond", serif;
    font-size: clamp(16px, 8vw, 28px);
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--ink);
    text-transform: uppercase;
    cursor: pointer;
}

.nav-bottom {
    display: flex;
    overflow-x: auto;
    padding: 8px 20px 13px 20px;
    scrollbar-width: none;
}
.nav-bottom::-webkit-scrollbar { display: none; }

.nav-inner {
    display: flex;
    gap: 8px;
    margin: 0 auto;
}

.cat {
    flex: 0 0 auto;
    padding: clamp(5px, 0.8vw, 9px) clamp(10px, 1.4vw, 20px);
    border-radius: 25px;
    border: 1px solid var(--base-dark);
    background: transparent;
    color: var(--ink-soft);
    font-family: "DM Sans", sans-serif;
    font-size: clamp(11px, 1.1vw, 15px);
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.3s ease;
    letter-spacing: 0.02em;
}

.cat:hover {
    background: var(--base-dark);
    color: #f3e8d8;
    border-color: var(--base-dark);
}

.cat.active {
    background: var(--base-darker);
    color: var(--base-lighter);
    border-color: var(--base-darker);
    box-shadow: 0 3px 12px rgba(28,20,16,0.2);
    font-weight: 600;
}

/* ── HERO LOGO ───────────────────────────────────────────── */
/* 1. Hapësirë e barabartë lart (nga navbar) dhe poshtë (nga kategoria e parë) */
.hero {
    display: flex;
    justify-content: center;
    align-items: center;
    padding-top: 100px;   /* navbar (~70px) + 30px hapësirë */
    padding-bottom: 48px;
    padding-left: 20px;
    padding-right: 20px;
}

.hero-logo {
    width: 60vw;
    height: auto;
    object-fit: contain;
    display: block;
}

/* ── MAIN ───────────────────────────────────────────────── */
main {
    padding-top: 0;
    padding-bottom: 60px;
}

/* ── SECTION DIVIDER ────────────────────────────────────── */
/* 2. Vijë horizontale mes kategorive — elegante dhe proporcionale */
.section {
    padding: 44px 16px 16px 16px;
    position: relative;
}

/* Vija shfaqet para çdo seksioni PËRVEÇ të parit */
.section + .section::before {
    content: "";
    display: block;
    width: 50%;                      /* 50% e ekranit — dallueshme por jo dominuese */
    max-width: 320px;
    height: 1px;
    background: linear-gradient(
        to right,
        transparent,
        var(--base-dark) 20%,
        var(--base-dark) 80%,
        transparent
    );
    margin: 0 auto 44px auto;
}

/* ── SECTION HEADER ─────────────────────────────────────── */
/* 3. Emri i kategorisë + logo 25vw poshtë tij */
.section-title {
    text-align: center;
    margin-bottom: 32px;
}

.section-title h2 {
    font-family: "Cormorant Garamond", serif;
    font-size: clamp(1.6rem, 4vw, 3rem);
    font-weight: 600;
    color: var(--ink-soft);
    display: inline-block;
    letter-spacing: 0.04em;
    margin-bottom: clamp(12px, 2vw, 22px);
}

/* Logo e kategorisë — 25vw, e qendërzuar poshtë titullit */
.section-logo {
    width: 60vw;
    height: auto;
    object-fit: contain;
    display: block;
    margin: 0 auto;
    opacity: 0.88;
}

/* ── PRODUCT CARD ───────────────────────────────────────── */
.product {
    width: 70vw;
    max-width: 70vw;
    margin: 0 auto 28px auto;
    background: transparent;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 6px 20px rgba(28,20,16,0.1);
    border: 1.5px solid var(--base-dark);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.product:hover {
    transform: translateY(-4px);
    box-shadow: 0 14px 32px rgba(28,20,16,0.16);
}

.img {
    width: 100%;
    aspect-ratio: 3 / 4;
    position: relative;
    background: transparent;
    overflow: hidden;
}

.img::before { display: none; }
.img::after  { display: none; }

.img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
}

.price {
    position: absolute;
    bottom: 10px;
    right: 10px;
    background: #643f13;
    color: #fae8cf;
    padding: clamp(4px, 0.5vw, 7px) clamp(8px, 1vw, 15px);
    border-radius: 20px;
    font-weight: 700;
    font-size: clamp(11px, 1.3vw, 16px);
    box-shadow: 0 3px 10px rgba(0,0,0,0.2);
    z-index: 2;
    letter-spacing: 0.02em;
}

.content {
    padding: clamp(10px, 1.2vw, 18px) clamp(12px, 1.5vw, 24px);
    text-align: center;
    background: #f4dab4;
}

.content h3 {
    font-family: "Cormorant Garamond", serif;
    font-size: clamp(14px, 1.8vw, 24px);
    font-weight: 600;
    margin-bottom: 4px;
    color: var(--ink-soft);
    letter-spacing: 0.01em;
}

.content p {
    font-size: clamp(11px, 1.1vw, 15px);
    color: var(--text-mid);
    line-height: 1.5;
}

/* ── FOOTER ─────────────────────────────────────────────── */
footer {
    text-align: center;
    padding: 24px 16px;
    background: var(--base-darker);
    color: var(--base-lighter);
    font-size: clamp(10px, 1vw, 14px);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border-top: 1px solid var(--base-dark);
}

/* ── RESPONSIVE ─────────────────────────────────────────── */
@media (max-width: 420px) {
    .nav-top { padding: 10px 14px 8px 14px; }
}
</style>

const currentLang = "en";

let observer;
let isClickScrolling = false;
let clickTargetId    = null;
let clickScrollTimeout = null;
let scrollScheduled  = false;

function renderMenu() {
    const menu = document.getElementById("menu");
    const nav  = document.getElementById("navCats");
    menu.innerHTML = "";
    nav.innerHTML  = "";

    categories.forEach((c) => {
        nav.innerHTML += `<button class="cat" data-id="${c.id}">${c[currentLang].title}</button>`;

        let itemsHtml = "";
        c.items.forEach(item => {
            const priceHtml = item.price
                ? `<div class="price">${item.price}</div>` : "";
            const imgTag = item.img
                ? `<img src="${item.img}" alt="${item[currentLang].name}" loading="lazy" onerror="this.style.display='none'">` : "";

            itemsHtml += `
            <div class="product">
                <div class="img">${imgTag}${priceHtml}</div>
                <div class="content"><h3>${item[currentLang].name}</h3></div>
            </div>`;
        });

        /* Logo e kategorisë — null për Vodka, foto specifike për të tjerat */
        const catLogo = CAT_LOGOS[c.id];
        const logoHtml = catLogo
            ? `<img class="section-logo" src="${catLogo}" alt="${c[currentLang].title} logo">`
            : "";

        menu.innerHTML += `
        <section class="section" id="${c.id}">
            <div class="section-title">
                <h2>${c[currentLang].title}</h2>
                ${logoHtml}
            </div>
            ${itemsHtml}
        </section>`;
    });

    attachNavClickHandlers();
    initObserver();
}

function getNavbarHeight() {
    const nb = document.querySelector(".navbar");
    return nb ? nb.offsetHeight : 120;
}

function setActiveButton(id, fromClick = false) {
    const btn = document.querySelector(`.cat[data-id="${id}"]`);
    if (!btn || btn.classList.contains("active")) return;
    document.querySelectorAll(".cat").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    btn.scrollIntoView({ behavior: fromClick ? "smooth" : "instant", inline: "center", block: "nearest" });
}

function updateActiveSection() {
    if (isClickScrolling) return;
    const sections = document.querySelectorAll(".section");
    if (!sections.length) return;
    const line = getNavbarHeight() + 1;
    let activeId = sections[0].id;
    sections.forEach(s => { if (s.getBoundingClientRect().top <= line) activeId = s.id; });
    setActiveButton(activeId);
}

function attachNavClickHandlers() {
    document.querySelectorAll(".cat").forEach(btn => {
        btn.onclick = () => {
            const section = document.getElementById(btn.dataset.id);
            if (!section) return;
            clickTargetId = btn.dataset.id;
            isClickScrolling = true;
            clearTimeout(clickScrollTimeout);
            clickScrollTimeout = setTimeout(() => {
                isClickScrolling = false;
                clickTargetId = null;
                updateActiveSection();
            }, 2500);
            setActiveButton(btn.dataset.id, true);
            const y = section.getBoundingClientRect().top + window.scrollY - getNavbarHeight();
            window.scrollTo({ top: y, behavior: "smooth" });
        };
    });
}

function initObserver() {
    if (observer) observer.disconnect();
    const sections = document.querySelectorAll(".section");
    const nbh = getNavbarHeight();
    const thresholds = Array.from({ length: 21 }, (_, i) => i / 20);
    observer = new IntersectionObserver(() => updateActiveSection(), {
        rootMargin: `-${nbh}px 0px 0px 0px`,
        threshold: thresholds
    });
    sections.forEach(s => observer.observe(s));
    updateActiveSection();
}

function onWindowScroll() {
    if (scrollScheduled) return;
    scrollScheduled = true;
    requestAnimationFrame(() => { updateActiveSection(); scrollScheduled = false; });
}
window.addEventListener("scroll", onWindowScroll, { passive: true });

window.addEventListener("scrollend", () => {
    if (isClickScrolling) {
        isClickScrolling = false;
        clearTimeout(clickScrollTimeout);
        updateActiveSection();
    }
});

let resizeTimeout;
window.addEventListener("resize", () => {
    clearTimeout(resizeTimeout);
    resizeTimeout = setTimeout(initObserver, 200);
});

window.onload = () => {
    renderMenu();
    /* Rregullon hero padding-top sipas lartësisë reale të navbar */
    const adjustHero = () => {
        const nb = document.querySelector(".navbar");
        const hero = document.getElementById("hero");
        if (nb && hero) hero.style.paddingTop = (nb.offsetHeight + 32) + "px";
    };
    adjustHero();
    window.addEventListener("resize", adjustHero);
};
</script>
