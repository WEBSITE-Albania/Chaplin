<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
    --green-deep:    #1A2E25;
    --green-main:    #2D4A3E;
    --green-light:   #3A5E50;
    --gold:          #A8892A;
    --gold-light:    #C4A84E;
    --gold-bright:   #D4B86A;
    --cream:         #F5F0E8;
    --cream-card:    #EDEAE0;
    --text-dark:     #1A2010;
    --text-mid:      #4A5C4E;
    --text-light:    #7A8C7E;
}

body {
    font-family: "DM Sans", sans-serif;
    background: var(--cream);
    color: var(--text-dark);
    min-height: 100vh;
}

html { scroll-behavior: smooth; }

/* ── NAVBAR ─────────────────────────────────────────────── */
.navbar {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    background: rgba(26, 46, 37, 0.97);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    z-index: 1000;
    box-shadow: 0 4px 20px rgba(0,0,0,0.35);
    border-bottom: 1px solid rgba(201, 168, 76, 0.25);
}

.nav-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 24px 10px 24px;
}

/* Logo area */
.logo-area {
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
}

.logo-img-slot {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 1.5px solid var(--gold);
    background: rgba(201,168,76,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    flex-shrink: 0;
}

/* Placeholder film-reel icon inside the logo circle */
.logo-img-slot svg {
    width: 26px;
    height: 26px;
    opacity: 0.55;
    fill: var(--gold);
}

/* When a real logo image is placed here: .logo-img-slot img { width:100%; height:100%; object-fit:cover; } */

.logo-text {
    font-family: "Cormorant Garamond", serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--gold);
}

/* Language buttons */
.lang {
    display: flex;
    gap: 6px;
}

.lang button {
    border: 1px solid rgba(201,168,76,0.3);
    padding: 5px 10px;
    border-radius: 20px;
    cursor: pointer;
    background: transparent;
    color: rgba(245,240,232,0.75);
    font-size: 14px;
    font-family: "Inter", sans-serif;
    font-weight: 500;
    transition: all 0.25s;
}

.lang button:hover,
.lang button.active-lang {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--green-deep);
}

/* ── CATEGORY NAV ───────────────────────────────────────── */
.nav-bottom {
    display: flex;
    overflow-x: auto;
    padding: 8px 20px 13px 20px;
    scrollbar-width: none;
}
.nav-bottom::-webkit-scrollbar { display: none; }

.nav-inner {
    display: flex;
    gap: 8px;
    margin: 0 auto;
}

.cat {
    flex: 0 0 auto;
    padding: 7px 16px;
    border-radius: 25px;
    border: 1px solid rgba(201,168,76,0.2);
    background: rgba(255,255,255,0.04);
    color: rgba(245,240,232,0.7);
    font-family: "Inter", sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.3s ease;
    letter-spacing: 0.02em;
}

.cat:hover {
    background: rgba(201,168,76,0.18);
    color: var(--gold-light);
    border-color: rgba(201,168,76,0.4);
}

.cat.active {
    background: var(--gold);
    color: var(--green-deep);
    border-color: var(--gold);
    box-shadow: 0 3px 12px rgba(201,168,76,0.35);
    font-weight: 600;
}

/* ── MAIN ───────────────────────────────────────────────── */
main {
    padding-top: 130px;
    padding-bottom: 60px;
}

/* ── SECTION ────────────────────────────────────────────── */
.section {
    padding: 50px 16px 16px 16px;
}

.section-title {
    text-align: center;
    margin-bottom: 34px;
}

.section-title h2 {
    font-family: "Cormorant Garamond", serif;
    font-size: 2.2rem;
    font-weight: 600;
    color: var(--green-main);
    display: inline-block;
    position: relative;
}

.section-title h2::before {
    content: "";
    display: block;
    width: 30px;
    height: 1px;
    background: var(--gold);
    margin: 0 auto 10px auto;
}

.section-title h2::after {
    content: "";
    display: block;
    width: 30px;
    height: 1px;
    background: var(--gold);
    margin: 10px auto 0 auto;
}

/* ── PRODUCT CARD ───────────────────────────────────────── */
.product {
    width: 56%;
    max-width: 560px;
    margin: 0 auto 28px auto;
    background: var(--cream-card);
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 8px 24px rgba(26,46,37,0.08);
    border: 1px solid rgba(201,168,76,0.15);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.product:hover {
    transform: translateY(-4px);
    box-shadow: 0 16px 36px rgba(26,46,37,0.14);
}

.img {
    width: 100%;
    aspect-ratio: 4 / 3;
    position: relative;
    background: var(--green-main);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

/* Elegant placeholder when no image is loaded */
.img::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
        linear-gradient(135deg, var(--green-deep) 0%, var(--green-light) 100%);
    opacity: 1;
}

.img::after {
    content: "◆";
    position: absolute;
    font-size: 28px;
    color: rgba(201,168,76,0.25);
    letter-spacing: 6px;
}

.img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: relative;
    z-index: 1;
}

.price {
    position: absolute;
    bottom: 10px;
    right: 10px;
    background: var(--gold);
    color: var(--green-deep);
    padding: 5px 13px;
    border-radius: 20px;
    font-weight: 700;
    font-size: 14px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.25);
    z-index: 2;
    letter-spacing: 0.02em;
}

.content {
    padding: 14px 20px 18px 20px;
    text-align: center;
}

.content h3 {
    font-family: "Cormorant Garamond", serif;
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 4px;
    color: var(--green-deep);
    letter-spacing: 0.01em;
}

.content p {
    font-size: 13px;
    color: var(--text-mid);
    line-height: 1.5;
}

/* ── FOOTER ─────────────────────────────────────────────── */
footer {
    text-align: center;
    padding: 24px 16px;
    background: var(--green-deep);
    color: rgba(201,168,76,0.5);
    font-size: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border-top: 1px solid rgba(201,168,76,0.12);
}

/* ── RESPONSIVE ─────────────────────────────────────────── */
@media (max-width: 768px) {
    .product {
        width: 88%;
        min-width: 260px;
    }
    .logo-text { font-size: 19px; }
    .section-title h2 { font-size: 1.8rem; }
}

@media (max-width: 420px) {
    .product { width: 96%; }
    .nav-top { padding: 10px 14px 8px 14px; }
}

/* ── Language persistence ─────────────────────────────────────────── */
function getStoredLang() {
    try { return localStorage.getItem("chaplin_lang"); } catch(e) { return null; }
}
function setStoredLang(lang) {
    try { localStorage.setItem("chaplin_lang", lang); } catch(e) {}
}

let currentLang = getStoredLang() || "sq";
let observer;
let isClickScrolling = false;
let clickTargetId = null;       // id that was clicked — stays active until scroll fully ends
let clickScrollTimeout = null;
let scrollScheduled = false;

/* ── Render ──────────────────────────────────────────────────────── */
function renderMenu() {
    const menu = document.getElementById("menu");
    const nav  = document.getElementById("navCats");

    menu.innerHTML = "";
    nav.innerHTML  = "";

    // Update language button highlight
    document.getElementById("btn-sq").classList.toggle("active-lang", currentLang === "sq");
    document.getElementById("btn-en").classList.toggle("active-lang", currentLang === "en");

    categories.forEach(c => {
        nav.innerHTML += `<button class="cat" data-id="${c.id}">${c[currentLang].title}</button>`;

        let itemsHtml = "";
        c.items.forEach(item => {
            const priceHtml = item.price.trim() !== ""
                ? `<div class="price">${item.price}</div>`
                : "";
            const descHtml = item[currentLang].desc && item[currentLang].desc.trim() !== ""
                ? `<p>${item[currentLang].desc}</p>`
                : "";
            const imgTag = item.img && item.img.trim() !== ""
                ? `<img src="${item.img}" alt="${item[currentLang].name}" loading="lazy" onerror="this.style.display='none'">`
                : "";

            itemsHtml += `
            <div class="product">
                <div class="img">
                    ${imgTag}
                    ${priceHtml}
                </div>
                <div class="content">
                    <h3>${item[currentLang].name}</h3>
                    ${descHtml}
                </div>
            </div>`;
        });

        menu.innerHTML += `
        <section class="section" id="${c.id}">
            <div class="section-title">
                <h2>${c[currentLang].title}</h2>
            </div>
            ${itemsHtml}
        </section>`;
    });

    attachNavClickHandlers();
    initObserver();
}

function setActiveButton(id, fromClick = false) {
    const btn = document.querySelector(`.cat[data-id="${id}"]`);
    if (!btn || btn.classList.contains("active")) return;
    document.querySelectorAll(".cat").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    // Only scroll the nav pill into view when it's a direct click action,
    // not during intermediate scroll-spy updates (which cause visual fighting).
    if (fromClick) {
        btn.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });
    }
}

function updateActiveSection() {
    if (isClickScrolling) return; // locked while click-scroll animation runs
    const sections = document.querySelectorAll(".section");
    if (!sections.length) return;
    const line = getNavbarHeight() + 1;
    let activeId = sections[0].id;
    sections.forEach(s => {
        if (s.getBoundingClientRect().top <= line) activeId = s.id;
    });
    setActiveButton(activeId);
}

function attachNavClickHandlers() {
    document.querySelectorAll(".cat").forEach(btn => {
        btn.onclick = () => {
            const section = document.getElementById(btn.dataset.id);
            if (!section) return;

            clickTargetId = btn.dataset.id;
            isClickScrolling = true;
            clearTimeout(clickScrollTimeout);
            // Safety-net timeout: long enough for even the longest smooth-scroll
            clickScrollTimeout = setTimeout(() => {
                isClickScrolling = false;
                clickTargetId = null;
                updateActiveSection();
            }, 2500);

            // Activate the clicked button immediately and scroll the pill into view
            setActiveButton(btn.dataset.id, true);

            const y = section.getBoundingClientRect().top + window.scrollY - getNavbarHeight();
            window.scrollTo({ top: y, behavior: "smooth" });
        };
    });
}

function initObserver() {
    if (observer) observer.disconnect();
    const sections = document.querySelectorAll(".section");
    const nbh = getNavbarHeight();
    const thresholds = Array.from({ length: 21 }, (_, i) => i / 20);
    observer = new IntersectionObserver(() => updateActiveSection(), {
        rootMargin: `-${nbh}px 0px 0px 0px`,
        threshold: thresholds
    });
    sections.forEach(s => observer.observe(s));
    updateActiveSection();
}

function onWindowScroll() {
    if (scrollScheduled) return;
    scrollScheduled = true;
    requestAnimationFrame(() => { updateActiveSection(); scrollScheduled = false; });
}
window.addEventListener("scroll", onWindowScroll, { passive: true });

window.addEventListener("scrollend", () => {
    if (isClickScrolling) {
        isClickScrolling = false;
        clearTimeout(clickScrollTimeout);
        updateActiveSection();
    }
});

let resizeTimeout;
window.addEventListener("resize", () => {
    clearTimeout(resizeTimeout);
    resizeTimeout = setTimeout(initObserver, 200);
});

function changeLang(lang) {
    currentLang = lang;
    setStoredLang(lang);
    const pos = window.scrollY;
    renderMenu();
    window.scrollTo(0, pos);
}

window.onload = () => renderMenu();
</script>
